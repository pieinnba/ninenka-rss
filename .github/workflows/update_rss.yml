name: Update Telegram RSS

on:
  schedule:
    - cron: '23 * * * *' # Запуск кожну годину (хвилина 0)
  workflow_dispatch: # Дозволяє запускати скрипт вручну кнопкою в інтерфейсі

permissions:
  contents: write # Дозвіл для бота записувати оновлений XML файл у репозиторій
  id-token: write   # Дозвіл для авторизації деплою

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
    - name: Перевірка коду (Checkout)
      uses: actions/checkout@v4

    - name: Налаштування Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Встановлення залежностей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Запуск скрипта
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python tg_to_rss.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # ДОДАЄМО ОБИДВА ФАЙЛИ: і фід, і файл історії
        git add telegram_feed.xml last_post.txt
        # Коммітимо зміни (якщо вони є)
        git commit -m "Auto-update RSS feed and last post ID" || echo "No changes to commit"
        git push